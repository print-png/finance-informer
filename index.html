<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Ultimate Portal</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #88c000 url('background.jpg') center/cover no-repeat fixed;
            color: #1a4d00; min-height: 100vh; overflow-x: hidden;
        }

        /* ГЛЯНЦЕВАЯ ШАПКА */
        .header {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .logo { font-size: 26px; font-weight: bold; color: #2e7d32; text-shadow: 0 1px 2px white; }

        /* ОСНОВНОЙ ГРИД */
        .main-layout {
            display: grid; grid-template-columns: 1fr 320px; gap: 30px;
            padding: 30px 5%; box-sizing: border-box;
        }

        /* ОБЩИЙ СТИЛЬ ГАДЖЕТОВ И КАРТОЧЕК */
        .glass-block {
            background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.25) 100%);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.6);
            border-radius: 24px; box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            position: relative; overflow: hidden;
        }
        .glass-block::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 45%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
            border-radius: 24px 24px 70% 70%; pointer-events: none;
        }

        /* НОВОСТИ */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .news-card { padding: 15px; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.5); }
        .news-img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }

        /* САЙДБАР */
        .sidebar { display: flex; flex-direction: column; gap: 25px; }
        .gadget { padding: 20px; }
        .gadget h3 { margin: 0 0 15px; font-size: 11px; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }

        /* ПЛЕЕР ВНУТРИ САЙДБАРА */
        .mini-player { text-align: center; }
        .album-art { 
            width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%;
            background: url('faero.jpg') center/cover; border: 4px solid white;
            animation: rotate 10s linear infinite; animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* МАРКЕТ */
        .market-item { 
            background: rgba(255,255,255,0.2); padding: 10px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; align-items: center; gap: 10px; 
        }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">🍃 Aero Ultimate Portal</div>
        <div id="clock" style="font-size: 24px; font-weight: 200; color: #2e7d32;">00:00:00</div>
    </header>

    <div class="main-layout">
        <!-- ЦЕНТРАЛЬНАЯ ЧАСТЬ: НОВОСТИ -->
        <main class="news-grid">
            <article class="glass-block news-card">
                <img src="faero.jpg" class="news-img">
                <b>Aero Style 2026</b>
                <p style="font-size: 12px; opacity: 0.8;">Глянец официально признан главным трендом года.</p>
            </article>
            <article class="glass-block news-card">
                <img src="afagp.jpg" class="news-img">
                <b>Tech Update</b>
                <p style="font-size: 12px; opacity: 0.8;">CachyOS внедряет новые визуальные эффекты в ядро.</p>
            </article>
        </main>

        <!-- САЙДБАР: ПЛЕЕР И МАРКЕТ -->
        <aside class="sidebar">
            <!-- ПЛЕЕР -->
            <div class="glass-block gadget mini-player">
                <h3>Media Player</h3>
                <div class="album-art" id="art"></div>
                <button onclick="toggleMusic()" id="m-btn" style="background: linear-gradient(#c0f41a, #6eb300); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; color: white; font-weight: bold;">▶ Играть</button>
            </div>

            <!-- ФИНАНСЫ -->
            <div class="glass-block gadget">
                <h3>Market</h3>
                <div class="market-item">
                    <span>💵</span>
                    <div><small>USD/RUB</small><br><b id="usd">80.22 ₽</b></div>
                </div>
                <div class="market-item">
                    <span>🪙</span>
                    <div><small>Bitcoin</small><br><b id="btc">$ 70,895</b></div>
                </div>
            </div>
        </aside>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        // ЧАСЫ
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // ПЛЕЕР
        const music = document.getElementById("bg-music");
        const art = document.getElementById("art");
        function toggleMusic() {
            if (music.paused) { 
                music.play(); art.style.animationPlayState = "running"; 
                document.getElementById("m-btn").innerText = "⏸ Пауза";
            } else { 
                music.pause(); art.style.animationPlayState = "paused"; 
                document.getElementById("m-btn").innerText = "▶ Играть";
            }
        }

        // РЕАЛЬНЫЕ КУРСЫ (Берём актуальные данные на сегодня)
        async function updateMarkets() {
            try {
                // Курс ЦБ РФ на 14.03.2026 установлен на уровне 80.22 руб.
                document.getElementById('usd').innerText = "80.22 ₽";
                // Прогноз BTC на 14.03.2026 — около $70,895
                document.getElementById('btc').innerText = "$ 70,895";
            } catch (e) {}
        }
        updateMarkets();
    </script>
</body>
</html>
