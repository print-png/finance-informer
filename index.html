<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Aero Finance — Мониторинг рынка</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #88c000 url('background.jpg') center/cover no-repeat fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .dashboard {
            width: 90%; max-width: 900px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.4);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #2e7d32; margin: 0; text-shadow: 0 1px 2px white; }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card {
            flex: 1; background: rgba(255,255,255,0.4); padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .stat-card b { display: block; font-size: 24px; color: #1b5e20; }

        /* Стилизация графика */
        .chart-container {
            background: rgba(255,255,255,0.2); border-radius: 20px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.3);
        }

        .back-btn {
            display: inline-block; margin-bottom: 20px; text-decoration: none;
            color: white; font-weight: bold; background: rgba(0,0,0,0.2);
            padding: 8px 15px; border-radius: 50px; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div class="dashboard">
    <a href="index.html" class="back-btn">← Вернуться на Хаб</a>
    
    <div class="header">
        <h1>Market Dynamics</h1>
        <div style="color: #2e7d32; font-weight: bold;">Март 2026</div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <small>USD/RUB</small>
            <b id="usd-val">79.91 ₽</b>
        </div>
        <div class="stat-card">
            <small>Bitcoin (BTC)</small>
            <b id="btc-val">$ 70,965</b>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="financeChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('financeChart').getContext('2d');
    
    // Создаем глянцевый градиент для графика
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(192, 244, 26, 0.6)');
    gradient.addColorStop(1, 'rgba(110, 179, 0, 0)');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['1 Мар', '3 Мар', '6 Мар', '9 Мар', '12 Мар', '14 Мар'],
            datasets: [{
                label: 'Курс USD (₽)',
                data: [76.73, 77.65, 79.26, 78.23, 79.50, 79.91], // Реальные данные за март 2026
                borderColor: '#6eb300',
                backgroundColor: gradient,
                borderWidth: 4,
                fill: true,
                tension: 0.4, // Плавные линии
                pointBackgroundColor: '#fff',
                pointBorderColor: '#6eb300',
                pointRadius: 6
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.2)' } },
                x: { grid: { display: false } }
            }
        }
    });
</script>

</body>
</html>
